<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Review recent income and expense transactions in Go Tracker with a responsive history dashboard."
    />
    <meta name="theme-color" content="#0f172a" />
    <title>Transactions - Go Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/history.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-logo">Go<span> Tracker</span></div>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="./history.html" class="active">Transactions</a></li>
        <li><a href="./add.html">Add</a></li>
        <li><a href="./setting.html">Profile</a></li>
      </ul>
    </nav>
    <div class="container">
      <div class="header-section">
        <h2 class="page-title">Recent Transactions</h2>
      </div>

      <div class="card summary-card">
        <div class="summary-grid">
          <div class="summary-item">
            <span class="summary-label">Total Income</span>
            <span class="summary-value income">$0.00</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Total Expenses</span>
            <span class="summary-value expense">$0.00</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Current Balance</span>
            <span class="summary-value balance">$0.00</span>
          </div>
        </div>
      </div>

      <div class="card history-list"></div>
    </div>
  </body>
  <script src="../js/app.js" defer></script>
</html>
